name: Build binaries
on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request: {}
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build binaries
        run: docker run --rm -v $(pwd):/prj giulioz/vc6-docker wine /opt/vc/BIN/CL.EXE z:\\prj\\cpp\\clip98.cpp /GX /IZ:\\opt\\vc\\INCLUDE /link /LIBPATH:Z:\\opt\\vc\\LIB user32.lib /out:Z:\\prj\\clip98.exe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: clip98.exe
          path: clip98.exe

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: clip98.exe

      - name: Move latest tag to current commit
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f latest HEAD
          git push -f origin latest

      - name: Release tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: clip98.exe

      - name: Update latest prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Development Build
          prerelease: true
          files: clip98.exe
