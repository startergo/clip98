name: Build binaries
on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request: {}
jobs:
  build-win98:
    name: Build Win98 EXE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build clip98.exe
        run: docker run --rm -v $(pwd):/prj giulioz/vc6-docker wine /opt/vc/BIN/CL.EXE z:\\prj\\cpp\\clip98.cpp /GX /IZ:\\opt\\vc\\INCLUDE /link /LIBPATH:Z:\\opt\\vc\\LIB user32.lib /out:Z:\\prj\\clip98.exe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: clip98.exe
          path: clip98.exe

  build-host:
    name: Build host binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: go
        run: |
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -o clip98-${{ matrix.goos }}-${{ matrix.goarch }}${ext} .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: clip98-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go/clip98-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-win98, build-host]
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir release
          cp artifacts/clip98.exe/clip98.exe release/
          cp artifacts/clip98-darwin-arm64/clip98-darwin-arm64 release/
          cp artifacts/clip98-darwin-amd64/clip98-darwin-amd64 release/
          cp artifacts/clip98-linux-amd64/clip98-linux-amd64 release/
          cp artifacts/clip98-windows-amd64/clip98-windows-amd64.exe release/
          ls -la release/

      - name: Move latest tag to current commit
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f latest HEAD
          git push -f origin latest

      - name: Release tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: release/*

      - name: Update latest prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Development Build
          prerelease: true
          files: release/*
